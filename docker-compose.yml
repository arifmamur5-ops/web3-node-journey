version: '3.8'

services:
  geth-node:
    image: ethereum/client-go:latest
    container_name: geth-holesky
    restart: unless-stopped
    ports:
      - "8545:8545"
      - "8551:8551"
      - "30303:30303"
      - "6060:6060" # [NEW] Port Metrics Geth
    volumes:
      - ./geth-data:/root/.ethereum
      - ./jwt.hex:/root/jwt.hex
    command:
      - --holesky
      - --syncmode=snap
      - --http
      - --http.api=eth,net,web3,engine,admin
      - --http.addr=0.0.0.0
      - --http.corsdomain=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8551
      - --authrpc.vhosts=*
      - --authrpc.jwtsecret=/root/jwt.hex
      - --metrics # [NEW] Nyalain Metrics
      - --metrics.addr=0.0.0.0
      - --metrics.port=6060

  lighthouse:
    image: sigp/lighthouse:latest
    container_name: lighthouse-holesky
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    ports:
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "5054:5054" # [NEW] Port Metrics Lighthouse
    volumes:
      - ./lighthouse-data:/root/.lighthouse
      - ./jwt.hex:/root/jwt.hex
    command:
      - lighthouse
      - beacon_node
      - --network=holesky
      - --execution-endpoint=http://geth-node:8551
      - --execution-jwt=/root/jwt.hex
      - --http
      - --http-address=0.0.0.0
      - --allow-insecure-genesis-sync
      - --metrics # [NEW] Nyalain Metrics
      - --metrics-address=0.0.0.0
      - --metrics-port=5054

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
